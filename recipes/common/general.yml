---
modules:
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    keys:
      - https://repos.fyralabs.com/terra44/key.asc
    install:
      - fish
      - grim
      - slurp
      - mako
      - helix
      - matugen
      - cliphist
      - adw-gtk3-theme
      - greetd
      - greetd-selinux
      - wl-clipboard
      - network-manager-applet
      - wlsunset
      - imv
      - caja
      - atril
      - mousepad
      - engrampa
      - paperwork
      - ffmpeg
      - x264
      - x265
      - zed
      - helium-browser-bin
      - helium-gtk-theme
      - noctalia-git
      - noctalia-greeter
      - ghostty
    remove:
      - vim-minimal
      - vim-enhanced
      - firefox
      - firefox-langpacks
  - type: systemd
    system:
      enabled:
        - greetd
        - firewalld
  - type: files
    files:
      - source: system
        destination: /
  - type: script
    scripts:
      - greetd-users.sh
