name: aethera-ublue
image-version: 44
base-image: ghcr.io/ublue-os/base-main
modules:
  - from-file: common/general.yml
  - from-file: compositor/niri.yml
  - from-file: common/gaming.yml
  - from-file: common/scripts.yml
  - type: initramfs
    # Move the args inside the initramfs module block
    args:
      - --omit-binaries
      - /usr/bin/nvim
description: "Niri + Noctalia in an Atomic Desktop"
