# --- Basic System Users ---
u bin - - /bin /sbin/nologin
u daemon - - /sbin /sbin/nologin
u adm - - /var/adm /sbin/nologin
u lp - - /var/spool/lpd /sbin/nologin
u mail - - /var/spool/mail /sbin/nologin
u uucp - - /var/spool/uucp /sbin/nologin
u nobody 65534:65534 "Nobody" / /sbin/nologin

# --- Hardware and Service Users ---
u dbus - "System D-Bus" /run/dbus /sbin/nologin
u systemd-network - "systemd Network Management" /run/systemd /sbin/nologin
u polkitd - "User for polkitd" /var/lib/polkit-1 /sbin/nologin
u sshd - "Privilege-separated SSH" /var/empty/sshd /sbin/nologin
u chrony - "Chrony Daemon" /var/lib/chrony /sbin/nologin

# --- Greetd and Session Management ---
u greetd - "Greetd Daemon" /var/lib/greetd /sbin/nologin

# --- Groups for Hardware/Audio/Gaming ---
g audio - -
g video - -
g render - -
g input - -
g disk - -
g wheel - -
g kvm - -

# --- Assign Users to Essential Groups ---
m greetd video
m greetd render
m greetd input

# --- Logging and Journaling ---
g systemd-journal - -
g systemd-journal-remote - -
u systemd-journal-gateway - "systemd Journal Gateway" /run/systemd/journal /sbin/nologin
u systemd-journal-upload - "systemd Journal Upload" /run/systemd/journal /sbin/nologin

# --- Printing and Scanning ---
u lp - - /var/spool/lpd /sbin/nologin
g lp - -
g lpadmin - -

# --- Desktop Integration & Security ---
# Provides access to hardware devices and input methods
g input - -
g tty - -
g dialout - -
g cdrom - -
g tape - -
g floppy - -

# --- Network & Messaging ---
u ntp - "NTP Daemon" /var/lib/ntp /sbin/nologin
g netdev - -
g sshd - -

# --- Virtualization and Containers (if using Podman/Docker) ---
g kvm - -
g qemu - -
